name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace:
          - "@schedule-app/shared"
          - "@schedule-app/crypto"
          - "@schedule-app/api"
          - "@schedule-app/web"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --workspace=${{ matrix.workspace }}

      - name: Test
        run: npm run test --workspace=${{ matrix.workspace }}

  build-docker-images:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build api image
        run: docker build -f infra/Dockerfile.api -t schedule-app-api:ci .

      - name: Build web image
        run: docker build -f infra/Dockerfile.web -t schedule-app-web:ci .

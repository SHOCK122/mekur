name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace:
          - "@schedule-app/shared"
          - "@schedule-app/crypto"
          - "@schedule-app/api"
          - "@schedule-app/web"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: scheduleapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/scheduleapp_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --workspace=${{ matrix.workspace }}

      - name: Test
        run: npm run test --workspace=${{ matrix.workspace }}

  build-docker-images:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build api image
        run: docker build -f infra/Dockerfile.api -t schedule-app-api:ci .

      - name: Build web image
        run: docker build -f infra/Dockerfile.web -t schedule-app-web:ci .
